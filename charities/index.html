<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S6SFT9M0ME"></script>
  <script src="../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Local charity partners for the Elk Grove Toy Drive Celebration — toys collected for children in our community." />
  <link rel="canonical" href="https://elkgrovetoydrive.com/charities/" />
  <meta property="og:title" content="Local Charities — Elk Grove Toy Drive Celebration" />
  <meta property="og:description" content="Local charity partners for the Elk Grove Toy Drive Celebration — toys collected for children in our community." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://elkgrovetoydrive.com/charities/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Local Charities — Elk Grove Toy Drive Celebration" />
  <meta name="twitter:description" content="Local charity partners for the Elk Grove Toy Drive Celebration." />

  <title>Local Charities — Elk Grove Toy Drive Celebration</title>
  <script src="../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("toydrive-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <div id="seo-prerender" class="seo-prerender">
      <section class="hero">
        <h1>Local Charities</h1>
        <p>We're proud to support local charities to bring smiles to children in our community!</p>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../doc-scroll.js"></script>
  <script src="../site.js"></script>
  <script>
    (async function () {
      const {
        initPageShell,
        loadSiteData,
        mountFooter,
        renderCharitiesPage,
        setPageTitle,
        initDocToc,
        escapeHtml,
      } = window.ToyDriveSite;
      initPageShell("charities");
      try {
        const site = await loadSiteData();
        setPageTitle(site, "Local charities");
        document.getElementById("main").innerHTML = renderCharitiesPage(site.charities);
        initDocToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
