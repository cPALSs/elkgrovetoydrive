<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S6SFT9M0ME"></script>
  <script src="../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Join the team — open director roles for the Elk Grove Toy Drive Celebration 2026 at District 56." />
  <link rel="canonical" href="https://elkgrovetoydrive.com/team/" />
  <meta property="og:title" content="Team — Elk Grove Toy Drive Celebration" />
  <meta property="og:description" content="Join the team — open director roles for the Elk Grove Toy Drive Celebration 2026." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://elkgrovetoydrive.com/team/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Team — Elk Grove Toy Drive Celebration" />
  <meta name="twitter:description" content="Join the team — open director roles for the Elk Grove Toy Drive Celebration 2026." />

  <title>Team — Elk Grove Toy Drive Celebration</title>
  <script src="../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("toydrive-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <div id="seo-prerender" class="seo-prerender">
      <section class="hero">
        <h1>Join the team</h1>
        <p>We're looking for directors — one owner per piece of the celebration.</p>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../doc-scroll.js"></script>
  <script src="../site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, mountFooter, renderTeamPage, initDocToc, setPageTitle, escapeHtml } =
        window.ToyDriveSite;
      initPageShell("team");
      try {
        const site = await loadSiteData();
        setPageTitle(site, "Team");
        document.getElementById("main").innerHTML = `
          <section class="hero">
            <h1>Team</h1>
          </section>
          ${renderTeamPage(site)}
        `;
        initDocToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
